quarkus.http.port=8080

# CORS: the SPA is served from GitHub Pages (link.eiji.dev) and calls this API
# on a different origin (api.eiji.dev), so cross-origin requests must be allowed.
# Set unconditionally (not %prod-gated) because the JAR is packaged with the
# default profile and only the *runtime* profile is prod — a build-time-gated
# value would be baked off. Harmless in dev/test (no requests come from this origin).
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=https://link.eiji.dev
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=content-type

# Schema is owned by Flyway. Hibernate only validates that entities match.
quarkus.hibernate-orm.database.generation=validate
quarkus.flyway.migrate-at-start=true

# Production: connects to the capypad postgres on the droplet.
# In container on capypad-net: CAPYLINK_DB_URL=jdbc:postgresql://postgres:5432/capylink
# Process on droplet:          CAPYLINK_DB_URL=jdbc:postgresql://127.0.0.1:5432/capylink
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${CAPYLINK_DB_USER:capylink}
%prod.quarkus.datasource.password=${CAPYLINK_DB_PASSWORD}
%prod.quarkus.datasource.jdbc.url=${CAPYLINK_DB_URL}

# Dev/test: Quarkus Dev Services starts an ephemeral postgres container automatically
# (requires Docker running locally). No datasource config needed here.

# Business rules
capylink.ttl-days=21
capylink.slug-length=7
capylink.base-url=${CAPYLINK_BASE_URL:http://localhost:8080}
capylink.cleanup-grace-days=7
