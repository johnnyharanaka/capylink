quarkus.http.port=8080

# Schema is owned by Flyway. Hibernate only validates that entities match.
quarkus.hibernate-orm.database.generation=validate
quarkus.flyway.migrate-at-start=true

# Production: connects to the capypad postgres on the droplet.
# In container on capypad-net: NOLINK_DB_URL=jdbc:postgresql://postgres:5432/nolink
# Process on droplet:          NOLINK_DB_URL=jdbc:postgresql://127.0.0.1:5432/nolink
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${NOLINK_DB_USER:nolink}
%prod.quarkus.datasource.password=${NOLINK_DB_PASSWORD}
%prod.quarkus.datasource.jdbc.url=${NOLINK_DB_URL}

# Dev/test: Quarkus Dev Services starts an ephemeral postgres container automatically
# (requires Docker running locally). No datasource config needed here.

# Business rules
nolink.ttl-days=21
nolink.slug-length=7
nolink.base-url=${NOLINK_BASE_URL:http://localhost:8080}
nolink.cleanup-grace-days=7
