name: Deploy Frontend to GitHub Pages

# The SPA (creation UI + client-side redirect for /{slug}) is hosted on GitHub
# Pages at link.eiji.dev. VITE_API_URL is public (it gets inlined into the
# bundle), so it's set inline here rather than via a secret.
on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Write .env.production
        working-directory: frontend
        run: echo "VITE_API_URL=https://api.eiji.dev" > .env.production

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Add CNAME
        run: echo "link.eiji.dev" > frontend/dist/CNAME

      - name: Copy index.html as 404.html (SPA fallback for /{slug})
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
